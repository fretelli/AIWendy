# KeelTrader v2 — AI Native Trading Assistant
# Deployment: local server (114.66.46.52)
# DB: NAS PostgreSQL keeltrader (FRP 5433) | Redis: local shared services-redis
#
# Default: docker compose up -d                    → 2 containers (api + web)
# IBKR: docker compose --profile ibkr up -d     → 3 containers (+ ib-gateway)

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: keeltrader-api:latest
    container_name: keeltrader-api
    restart: unless-stopped
    mem_limit: 512m
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:noexec,size=100M
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - KEELTRADER_AUTH_REQUIRED=${KEELTRADER_AUTH_REQUIRED:-0}
      - KEELTRADER_AUTO_INIT_DB=${KEELTRADER_AUTO_INIT_DB:-1}
      - KEELTRADER_AUTO_INIT_TEST_USERS=${KEELTRADER_AUTO_INIT_TEST_USERS:-0}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ENVIRONMENT=production
    volumes:
      - uploads_data:/app/uploads
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.keeltrader-api.rule=Host(`keeltrader.joyeeassets.com`) && PathPrefix(`/api`)"
      - "traefik.http.routers.keeltrader-api.entrypoints=websecure"
      - "traefik.http.routers.keeltrader-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.keeltrader-api.loadbalancer.server.port=8000"
      # MCP SSE endpoint
      - "traefik.http.routers.keeltrader-mcp.rule=Host(`keeltrader.joyeeassets.com`) && PathPrefix(`/mcp`)"
      - "traefik.http.routers.keeltrader-mcp.entrypoints=websecure"
      - "traefik.http.routers.keeltrader-mcp.tls.certresolver=letsencrypt"
      - "traefik.http.services.keeltrader-mcp.loadbalancer.server.port=8000"
    command: sh scripts/docker_start.sh

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://api:8000
        NEXT_PUBLIC_AUTH_REQUIRED: "1"
    container_name: keeltrader-web
    restart: unless-stopped
    mem_limit: 256m
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:noexec,size=50M
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://api:8000
      - NEXT_PUBLIC_AUTH_REQUIRED=1
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
    depends_on:
      api:
        condition: service_started
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.keeltrader-web.rule=Host(`keeltrader.joyeeassets.com`)"
      - "traefik.http.routers.keeltrader-web.entrypoints=websecure"
      - "traefik.http.routers.keeltrader-web.tls.certresolver=letsencrypt"
      - "traefik.http.services.keeltrader-web.loadbalancer.server.port=3000"

  # === IBKR mode (profiles: [ibkr]) ===

  ib-gateway:
    image: gnzsnz/ib-gateway:10.29.1
    container_name: keeltrader-ib-gateway
    restart: unless-stopped
    mem_limit: 1280m
    profiles:
      - ibkr
    environment:
      - TWS_USERID=${IBKR_USERNAME}
      - TWS_PASSWORD=${IBKR_PASSWORD}
      - TRADING_MODE=${IBKR_TRADING_MODE:-paper}
      - TWS_ACCEPT_INCOMING=accept
      - READ_ONLY_API=${IBKR_READ_ONLY:-yes}
      - TWS_PORT=4001
    volumes:
      - ib_gateway_data:/root/Jts

volumes:
  uploads_data:
  ib_gateway_data:

networks:
  default:
    external: true
    name: services
